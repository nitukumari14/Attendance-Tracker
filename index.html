<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Attendance Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Smart Attendance Tracker</h1>
      <a href="records.html">View Records</a>
    </header>

    <form>
      <label>Student name</label>
      <input type="text" placeholder="Enter your name" /><br /><br />
      <label>Roll Number</label>
      <input type="text" placeholder="Enter your roll number" /><br /><br />
      <label>Date</label>
      <input type="date" /><br /><br />

      <label>Attendance</label>

      <label><input type="radio" name="attendance" /> Present</label>
      <label><input type="radio" name="attendance" /> Absent</label>
      <label><input type="radio" name="attendance" /> Late</label><br />

      <button>Submit</button>
    </form>

    <footer>
  <p>© 2026 Smart Attendance Tracker | Made by Nitu | BCA Student 💙</p>
